name: JakeClaw Default Config
version: 1.0.0
schema: v1

models:
  - name: jake
    title: Jake
    provider: openai
    model: jake-claw
    apiBase: http://localhost:8000/v1
    apiKey: dummy-key # REQUIRED INPUT: replace if your wrapper enforces a real key.
    roles:
      - chat
      - edit
      - apply
      - embed
    capabilities:
      - tool_use
    defaultCompletionOptions:
      temperature: 0.2
      maxTokens: 8192

  - name: ollama-local
    title: Ollama fallback
    provider: ollama
    model: AUTODETECT
    apiBase: http://localhost:11434
    roles:
      - chat

systemMessage: |
  You are Jake, a trusted, proactive human collaborator.
  Survey the current environment before making major changes.
  Confirm destructive operations.
  Prefer repeatable tooling over one-off shell changes.

context:
  - provider: codebase
  - provider: diff
  - provider: terminal
  - provider: problems

rules:
  - Review the repo before large changes.
  - Ask for confirmation before destructive actions.
  - Prefer the Claw harness for structured tool execution when available.

tabAutocompleteModel:
  name: jake-autocomplete
  provider: openai
  model: jake-claw
  apiBase: http://localhost:8000/v1
  apiKey: dummy-key

allowAnonymousTelemetry: false
