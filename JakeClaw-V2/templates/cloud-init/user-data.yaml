#cloud-config
# JakeClaw-V2 — cloud-init user-data
#
# This file is uploaded to Proxmox as a snippet and applied to the Jake VM
# on first boot. Fill in every value marked <<REPLACE_...>> before use.
# The create-Jake-vm.sh script handles this substitution automatically.

# ---------------------------------------------------------------------------
# System identity
# ---------------------------------------------------------------------------
hostname: jake
fqdn: jake.local
manage_etc_hosts: true

# ---------------------------------------------------------------------------
# Jake user account
# ---------------------------------------------------------------------------
users:
  - name: jake
    gecos: "Jake AI Agent"
    groups: [sudo, adm, docker]
    shell: /bin/bash
    lock_passwd: false
    # hashed password — generate with: openssl passwd -6 'yourpassword'
    passwd: "<<REPLACE_HASHED_PASSWORD>>"
    ssh_authorized_keys:
      - "<<REPLACE_SSH_PUBLIC_KEY>>"
    sudo: "ALL=(ALL) NOPASSWD:ALL"

# ---------------------------------------------------------------------------
# Locale and timezone
# ---------------------------------------------------------------------------
locale: en_US.UTF-8
timezone: UTC

# ---------------------------------------------------------------------------
# Base packages (apt)
# ---------------------------------------------------------------------------
package_update: true
package_upgrade: false
packages:
  - git
  - curl
  - wget
  - unzip
  - jq
  - htop
  - tmux
  - vim
  - build-essential
  - pkg-config
  - python3
  - python3-pip
  - python3-venv
  - python3-dev
  - ca-certificates
  - gnupg
  - lsb-release
  - flock
  - util-linux

# ---------------------------------------------------------------------------
# Write helper files before runcmd
# ---------------------------------------------------------------------------
write_files:
  # Deployment config sourced by all bootstrap scripts
  - path: /etc/jake-deployment.conf
    owner: root:root
    permissions: "0644"
    content: |
      # JakeClaw deployment configuration — auto-generated by cloud-init
      JAKE_USER=jake
      JAKE_HOME=/home/jake
      JAKE_DATA_DIR=/Jake-data
      JAKE_REPO_DIR=/JakeClaw
      REPO_DIR=/JakeClaw/JakeClaw-V2
      JAKECLAW_REPO=<<REPLACE_JAKECLAW_REPO>>

  # Passwordless sudo (belt-and-suspenders alongside user.sudo above)
  - path: /etc/sudoers.d/jake-nopasswd
    owner: root:root
    permissions: "0440"
    content: |
      jake ALL=(ALL) NOPASSWD:ALL

# ---------------------------------------------------------------------------
# First-boot commands
# ---------------------------------------------------------------------------
runcmd:
  # --- Format and mount /Jake-data second disk ---
  # The disk device may be sdb, vdb, or sdc depending on your Proxmox setup.
  # create-Jake-vm.sh adds it as scsi1. Adjust <<REPLACE_DATA_DISK>> if needed.
  - |
    DATA_DISK=<<REPLACE_DATA_DISK>>
    MOUNT_POINT=/Jake-data
    if [ -b "$DATA_DISK" ] && ! blkid "$DATA_DISK" | grep -q ext4; then
      mkfs.ext4 -L jake-data "$DATA_DISK"
    fi
    mkdir -p "$MOUNT_POINT"
    if ! grep -q "$MOUNT_POINT" /etc/fstab; then
      echo "LABEL=jake-data  $MOUNT_POINT  ext4  defaults,nofail  0  2" >> /etc/fstab
    fi
    mount -a || true

  # --- Clone JakeClaw repo ---
  - |
    JAKECLAW_REPO=<<REPLACE_JAKECLAW_REPO>>
    if [ ! -d /JakeClaw/.git ]; then
      git clone "$JAKECLAW_REPO" /JakeClaw
    fi
    chown -R jake:jake /JakeClaw

  # --- Run bootstrap ---
  - bash /JakeClaw/JakeClaw-V2/scripts/bootstrap-Jake.sh

# ---------------------------------------------------------------------------
# Final message (shows in cloud-init logs)
# ---------------------------------------------------------------------------
final_message: |
  ============================================================
  Jake VM is ready!

  Access:
    code-server IDE : http://<<REPLACE_VM_IP>>:8080
    Jake API        : http://<<REPLACE_VM_IP>>:8000
    claw-code API   : http://<<REPLACE_VM_IP>>:8081

  Run verification:
    ssh jake@<<REPLACE_VM_IP>>
    bash /JakeClaw/JakeClaw-V2/scripts/deploy-test.sh --verbose
  ============================================================
